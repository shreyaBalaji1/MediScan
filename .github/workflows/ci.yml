name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Build API (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: MediScanApi

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: MediScanApi

  ui:
    name: Build & test UI (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mediscan-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mediscan-ui

      - name: Test
        run: npx ng test --watch=false
        working-directory: mediscan-ui

      - name: Build
        run: npx ng build
        working-directory: mediscan-ui
